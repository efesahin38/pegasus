<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vielen Dank — PEGASUS UMZUG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .danke {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      text-align: center;
      background: var(--gray-50);
    }
    .danke__box {
      max-width: 520px;
      background: var(--white);
      padding: 48px 40px;
      border-radius: 12px;
      border: 1px solid var(--gray-200);
    }
    .danke h1 {
      font-size: 1.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 16px;
    }
    .danke p { color: var(--gray-600); line-height: 1.7; margin-bottom: 28px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Pegasus Umzug Logo" class="logo__img" />
        <span class="logo__text">PEGASUS UMZUG</span>
      </a>
    </div>
  </header>

  <section class="danke">
    <div class="danke__box">
      <p class="label">ERFOLGREICH GESENDET</p>
      <h1>Vielen Dank!</h1>
      <p>
        Ihre Anfrage wurde übermittelt. Wir melden uns innerhalb von 24 Stunden bei Ihnen.
      </p>
      <a href="index.html" class="btn btn--primary">ZURÜCK ZUR STARTSEITE</a>
    </div>
  </section>
</body>
</html>
